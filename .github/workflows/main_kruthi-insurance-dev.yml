name: Build and deploy .NET Azure Function - kruthi-insurance-dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: './InsuranceClaims.Functions'
  DOTNET_VERSION: '8.0.x'

jobs:
  build-and-deploy:
    runs-on: windows-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: >
          dotnet restore
          "${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/InsuranceClaims.Functions.csproj"

      - name: Build function
        run: >
          dotnet build
          "${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/InsuranceClaims.Functions.csproj"
          --configuration Release
          --no-restore

      - name: Publish function
        run: >
          dotnet publish
          "${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/InsuranceClaims.Functions.csproj"
          --configuration Release
          --no-build
          --output "${{ github.workspace }}/published"

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E92D20E759E443A38D828A4867B0D9A3 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_320C292FB06F40588A9EDB29E6380A51 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_48994F3EA2844CBC812A1F1AB65DCBA1 }}

      - name: Deploy Azure Function
        uses: Azure/functions-action@v1
        with:
          app-name: 'kruthi-insurance-dev'
          slot-name: 'Production'
          package: '${{ github.workspace }}/published'
