name: Build and deploy Azure Function - kruthi-insurance-dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: './InsuranceClaims.Functions'
  DOTNET_VERSION: '8.0.x'

jobs:
  build-and-deploy:
    runs-on: windows-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        shell: pwsh
        run: |
          dotnet restore "${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/InsuranceClaims.Functions.csproj"

      - name: Build function
        shell: pwsh
        run: |
          dotnet build "${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/InsuranceClaims.Functions.csproj" `
            --configuration Release `
            --no-restore

      - name: Publish function
        shell: pwsh
        run: |
          dotnet publish "${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/InsuranceClaims.Functions.csproj" `
            --configuration Release `
            --no-build `
            --output "${{ github.workspace }}/published"

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_67D938676F9B4855AF053687767B14D5 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8FF92DD581A644098CACF72D3FF242A9 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_2E9A7029A30944FA9185BD71A2197BD4 }}

      - name: Deploy Azure Function
        uses: Azure/functions-action@v1
        with:
          app-name: 'kruthi-insurance-dev'
          slot-name: 'Production'
          package: '${{ github.workspace }}/published'
