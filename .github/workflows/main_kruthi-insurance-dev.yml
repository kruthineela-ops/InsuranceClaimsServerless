name: Build and deploy Azure Function - kruthi-insurance-dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: './InsuranceClaims.Functions'
  DOTNET_VERSION: '8.0.x'

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore "${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/InsuranceClaims.Functions.csproj"

      - name: Build
        run: dotnet build "${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/InsuranceClaims.Functions.csproj" --configuration Release --no-restore

      - name: Publish
        run: dotnet publish "${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/InsuranceClaims.Functions.csproj" --configuration Release --no-build --output "${{ github.workspace }}/published"

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: 'kruthi-insurance-dev'
          package: '${{ github.workspace }}/published'
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
